<html lang="en">

    <style>
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      
      html, body {
        background: #0a0a0f;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
      }
      
      /* Main game container - Phaser inserts canvas here */
      #game-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      
      /* Mobile controls - positioned dynamically via JS */
      #mobile-controls-portrait {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        display: none;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        padding: 8px 5px;
        padding-bottom: max(8px, env(safe-area-inset-bottom));
        background: linear-gradient(to bottom, rgba(10, 10, 15, 0.85), rgba(10, 10, 15, 0.95));
        z-index: 1000;
      }
      
      #mobile-controls-left {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 10px;
        padding-left: max(10px, env(safe-area-inset-left));
        background: linear-gradient(to right, rgba(10, 10, 15, 0.9), rgba(10, 10, 15, 0.7));
        z-index: 1000;
      }
      
      #mobile-controls-right {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 10px;
        padding-right: max(10px, env(safe-area-inset-right));
        background: linear-gradient(to left, rgba(10, 10, 15, 0.9), rgba(10, 10, 15, 0.7));
        z-index: 1000;
      }
      
      /* D-Pad container - uses touch area for swipe detection */
      .dpad-container {
        position: relative;
        width: 140px;
        height: 140px;
        flex-shrink: 0;
        touch-action: none;
      }
      
      /* D-Pad visual background */
      .dpad-bg {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        height: 100%;
        background: radial-gradient(circle, rgba(40, 40, 60, 0.6) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
      }
      
      .dpad-btn {
        position: absolute;
        width: 48px;
        height: 48px;
        background: rgba(60, 60, 80, 0.95);
        border: 2px solid rgba(100, 100, 120, 0.8);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #888899;
        font-family: sans-serif;
        font-size: 20px;
        user-select: none;
        transition: background 0.08s, transform 0.05s;
        pointer-events: none; /* D-pad buttons are visual only - container handles touch */
      }
      
      .dpad-btn.pressed {
        background: rgba(0, 200, 200, 0.5);
        color: #00ffff;
        transform: scale(0.93);
      }
      
      .dpad-up { top: 2px; left: 50%; transform: translateX(-50%); }
      .dpad-down { bottom: 2px; left: 50%; transform: translateX(-50%); }
      .dpad-left { left: 2px; top: 50%; transform: translateY(-50%); }
      .dpad-right { right: 2px; top: 50%; transform: translateY(-50%); }
      
      .dpad-up.pressed { transform: translateX(-50%) scale(0.93); }
      .dpad-down.pressed { transform: translateX(-50%) scale(0.93); }
      .dpad-left.pressed { transform: translateY(-50%) scale(0.93); }
      .dpad-right.pressed { transform: translateY(-50%) scale(0.93); }
      
      .dpad-center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 32px;
        height: 32px;
        background: rgba(50, 50, 70, 1);
        border-radius: 50%;
        pointer-events: none;
      }
      
      /* Action buttons (A/B) - LARGER sizes */
      .action-btn {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 3px solid;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        user-select: none;
        transition: transform 0.05s, filter 0.08s;
        font-family: sans-serif;
        flex-shrink: 0;
      }
      
      .action-btn:active, .action-btn.pressed {
        transform: scale(1.12);
        filter: brightness(1.3);
      }
      
      .btn-a {
        background: rgba(68, 170, 136, 0.85);
        border-color: rgba(102, 204, 170, 0.9);
      }
      
      .btn-b {
        background: rgba(136, 68, 170, 0.85);
        border-color: rgba(170, 102, 204, 0.9);
      }
      
      .action-btn .label {
        color: white;
        font-size: 24px;
        font-weight: bold;
      }
      
      .action-btn .sublabel {
        color: rgba(255,255,255,0.7);
        font-size: 9px;
        margin-top: 2px;
      }
      
      /* Menu buttons (Start/Select) - slightly larger */
      .menu-btn {
        padding: 10px 18px;
        background: rgba(68, 68, 102, 0.95);
        border: 2px solid rgba(102, 102, 136, 0.8);
        border-radius: 6px;
        color: #aaaaaa;
        font-family: sans-serif;
        font-size: 11px;
        user-select: none;
        transition: background 0.08s, color 0.08s;
        flex-shrink: 0;
      }
      
      .menu-btn:active, .menu-btn.pressed {
        background: rgba(102, 102, 136, 1);
        color: white;
      }
      
      /* Button groups */
      .ab-buttons {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      
      .ab-buttons-diagonal {
        position: relative;
        width: 170px;
        height: 120px;
      }
      
      .ab-buttons-diagonal .btn-a {
        position: absolute;
        top: 0;
        right: 0;
      }
      
      .ab-buttons-diagonal .btn-b {
        position: absolute;
        bottom: 0;
        left: 0;
      }
      
      .menu-buttons {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }
      
      /* Portrait: SELECT on left, START on right */
      .menu-buttons-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: center;
      }
      
      /* Fullscreen button */
      #fullscreen-btn {
        position: fixed;
        top: max(10px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        z-index: 2000;
        width: 44px;
        height: 44px;
        background: rgba(40, 40, 60, 0.9);
        border: 2px solid rgba(80, 80, 100, 0.8);
        border-radius: 8px;
        display: none;
        align-items: center;
        justify-content: center;
        color: #cccccc;
        cursor: pointer;
        user-select: none;
      }
      
      #fullscreen-btn:active {
        background: rgba(60, 60, 80, 1);
        color: white;
      }
      
      /* Fullscreen icon using SVG */
      #fullscreen-btn svg {
        width: 22px;
        height: 22px;
        stroke: currentColor;
        stroke-width: 2;
        fill: none;
      }
      
      /* Hide fullscreen button when in fullscreen */
      :fullscreen #fullscreen-btn,
      :-webkit-full-screen #fullscreen-btn {
        opacity: 0.3;
      }
      
      :fullscreen #fullscreen-btn:active,
      :-webkit-full-screen #fullscreen-btn:active {
        opacity: 1;
      }
      
      /* Landscape-specific sizing */
      @media (orientation: landscape) {
        .dpad-container {
          width: 160px;
          height: 160px;
        }
        .dpad-btn {
          width: 52px;
          height: 52px;
          font-size: 22px;
        }
        .dpad-center {
          width: 36px;
          height: 36px;
        }
        .action-btn {
          width: 85px;
          height: 85px;
        }
        .action-btn .label {
          font-size: 26px;
        }
        .ab-buttons-diagonal {
          width: 180px;
          height: 130px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Phaser canvas container -->
    <div id="game-container"></div>
    
    <!-- Portrait mode controls (bottom of screen) -->
    <!-- Layout: D-Pad | SELECT/START | B/A buttons -->
    <div id="mobile-controls-portrait">
      <!-- D-Pad (left) - container handles touch for swipe behavior -->
      <div class="dpad-container" id="dpad-portrait">
        <div class="dpad-bg"></div>
        <div class="dpad-center"></div>
        <div class="dpad-btn dpad-up" data-dir="up">▲</div>
        <div class="dpad-btn dpad-down" data-dir="down">▼</div>
        <div class="dpad-btn dpad-left" data-dir="left">◀</div>
        <div class="dpad-btn dpad-right" data-dir="right">▶</div>
      </div>
      
      <!-- Menu buttons (center) - SELECT on top, START on bottom -->
      <div class="menu-buttons-row">
        <button class="menu-btn" id="btn-select-p">SELECT</button>
        <button class="menu-btn" id="btn-start-p">START</button>
      </div>
      
      <!-- A/B buttons (right) - diagonal like SNES -->
      <div class="ab-buttons-diagonal">
        <button class="action-btn btn-a" id="btn-a-p">
          <span class="label">A</span>
          <span class="sublabel">JUMP</span>
        </button>
        <button class="action-btn btn-b" id="btn-b-p">
          <span class="label">B</span>
          <span class="sublabel">RUN</span>
        </button>
      </div>
    </div>
    
    <!-- Landscape mode controls (left side) - D-pad + SELECT -->
    <div id="mobile-controls-left">
      <div class="dpad-container" id="dpad-landscape">
        <div class="dpad-bg"></div>
        <div class="dpad-center"></div>
        <div class="dpad-btn dpad-up" data-dir="up">▲</div>
        <div class="dpad-btn dpad-down" data-dir="down">▼</div>
        <div class="dpad-btn dpad-left" data-dir="left">◀</div>
        <div class="dpad-btn dpad-right" data-dir="right">▶</div>
      </div>
      <div style="height: 25px;"></div>
      <button class="menu-btn" id="btn-select-l">SELECT</button>
    </div>
    
    <!-- Landscape mode controls (right side) - START + A/B -->
    <div id="mobile-controls-right">
      <button class="menu-btn" id="btn-start-r">START</button>
      <div style="height: 25px;"></div>
      <div class="ab-buttons-diagonal">
        <button class="action-btn btn-a" id="btn-a-l">
          <span class="label">A</span>
          <span class="sublabel">JUMP</span>
        </button>
        <button class="action-btn btn-b" id="btn-b-l">
          <span class="label">B</span>
          <span class="sublabel">RUN</span>
        </button>
      </div>
    </div>
    
    <!-- Fullscreen button -->
    <button id="fullscreen-btn" aria-label="Toggle fullscreen">
      <svg viewBox="0 0 24 24">
        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
      </svg>
    </button>
    
    <script>
      (function() {
        // Detect touch device
        const isTouchDevice = (
          'ontouchstart' in window ||
          navigator.maxTouchPoints > 0 ||
          navigator.msMaxTouchPoints > 0
        );
        
        // Virtual controls state (read by Phaser MobileControlsScene)
        window.virtualControlsState = {
          left: false,
          right: false,
          up: false,
          down: false,
          a: false,
          b: false,
          start: false,
          select: false
        };
        
        // References to control containers
        const portraitControls = document.getElementById('mobile-controls-portrait');
        const leftControls = document.getElementById('mobile-controls-left');
        const rightControls = document.getElementById('mobile-controls-right');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        // Update controls visibility based on orientation and touch device
        function updateControlsVisibility() {
          if (!isTouchDevice) {
            portraitControls.style.display = 'none';
            leftControls.style.display = 'none';
            rightControls.style.display = 'none';
            fullscreenBtn.style.display = 'none';
            return;
          }
          
          fullscreenBtn.style.display = 'flex';
          
          const isLandscape = window.innerWidth > window.innerHeight;
          
          if (isLandscape) {
            portraitControls.style.display = 'none';
            leftControls.style.display = 'flex';
            rightControls.style.display = 'flex';
            positionLandscapeControls();
          } else {
            portraitControls.style.display = 'flex';
            leftControls.style.display = 'none';
            rightControls.style.display = 'none';
            positionPortraitControls();
          }
        }
        
        // Position landscape controls to fill side gaps
        function positionLandscapeControls() {
          const canvas = document.querySelector('#game-container canvas');
          if (!canvas) {
            setTimeout(positionLandscapeControls, 100);
            return;
          }
          
          const canvasRect = canvas.getBoundingClientRect();
          const windowWidth = window.innerWidth;
          
          const leftSpace = canvasRect.left;
          const rightSpace = windowWidth - canvasRect.right;
          
          leftControls.style.width = Math.max(leftSpace, 180) + 'px';
          rightControls.style.width = Math.max(rightSpace, 180) + 'px';
        }
        
        // Position portrait controls below the canvas
        function positionPortraitControls() {
          const canvas = document.querySelector('#game-container canvas');
          if (!canvas) {
            setTimeout(positionPortraitControls, 100);
            return;
          }
          
          const canvasRect = canvas.getBoundingClientRect();
          const windowHeight = window.innerHeight;
          const bottomSpace = windowHeight - canvasRect.bottom;
          
          portraitControls.style.height = Math.max(bottomSpace, 160) + 'px';
        }
        
        // ============================================
        // D-PAD SWIPE/SLIDE HANDLING
        // The D-pad works like a joystick - finger can slide between directions
        // ============================================
        
        function setupDpad(containerId) {
          const container = document.getElementById(containerId);
          if (!container) return;
          
          let activeTouchId = null;
          
          // Get direction based on touch position relative to container center
          function getDirectionFromTouch(touch) {
            const rect = container.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const dx = touch.clientX - centerX;
            const dy = touch.clientY - centerY;
            
            // Dead zone in center (20% of container size)
            const deadZone = rect.width * 0.15;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            if (distance < deadZone) {
              return { up: false, down: false, left: false, right: false };
            }
            
            // Determine primary direction based on angle
            const angle = Math.atan2(dy, dx) * 180 / Math.PI;
            
            // Angle ranges: Right (-45 to 45), Down (45 to 135), Left (135 to 180 or -180 to -135), Up (-135 to -45)
            const result = { up: false, down: false, left: false, right: false };
            
            if (angle >= -45 && angle < 45) {
              result.right = true;
            } else if (angle >= 45 && angle < 135) {
              result.down = true;
            } else if (angle >= 135 || angle < -135) {
              result.left = true;
            } else if (angle >= -135 && angle < -45) {
              result.up = true;
            }
            
            return result;
          }
          
          function updateDpadState(directions) {
            window.virtualControlsState.up = directions.up;
            window.virtualControlsState.down = directions.down;
            window.virtualControlsState.left = directions.left;
            window.virtualControlsState.right = directions.right;
            
            // Update visual feedback on ALL d-pads
            document.querySelectorAll('.dpad-up').forEach(btn => {
              btn.classList.toggle('pressed', directions.up);
            });
            document.querySelectorAll('.dpad-down').forEach(btn => {
              btn.classList.toggle('pressed', directions.down);
            });
            document.querySelectorAll('.dpad-left').forEach(btn => {
              btn.classList.toggle('pressed', directions.left);
            });
            document.querySelectorAll('.dpad-right').forEach(btn => {
              btn.classList.toggle('pressed', directions.right);
            });
          }
          
          function clearDpad() {
            updateDpadState({ up: false, down: false, left: false, right: false });
          }
          
          container.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (activeTouchId === null && e.changedTouches.length > 0) {
              const touch = e.changedTouches[0];
              activeTouchId = touch.identifier;
              const dirs = getDirectionFromTouch(touch);
              updateDpadState(dirs);
            }
          }, { passive: false });
          
          container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
              const touch = e.changedTouches[i];
              if (touch.identifier === activeTouchId) {
                const dirs = getDirectionFromTouch(touch);
                updateDpadState(dirs);
                break;
              }
            }
          }, { passive: false });
          
          container.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
              if (e.changedTouches[i].identifier === activeTouchId) {
                activeTouchId = null;
                clearDpad();
                break;
              }
            }
          }, { passive: false });
          
          container.addEventListener('touchcancel', (e) => {
            activeTouchId = null;
            clearDpad();
          }, { passive: false });
          
          // Mouse support for testing on desktop
          let mouseDown = false;
          
          container.addEventListener('mousedown', (e) => {
            mouseDown = true;
            const rect = container.getBoundingClientRect();
            const fakeTouch = { clientX: e.clientX, clientY: e.clientY };
            const dirs = getDirectionFromTouch(fakeTouch);
            updateDpadState(dirs);
          });
          
          container.addEventListener('mousemove', (e) => {
            if (mouseDown) {
              const fakeTouch = { clientX: e.clientX, clientY: e.clientY };
              const dirs = getDirectionFromTouch(fakeTouch);
              updateDpadState(dirs);
            }
          });
          
          container.addEventListener('mouseup', () => {
            mouseDown = false;
            clearDpad();
          });
          
          container.addEventListener('mouseleave', () => {
            if (mouseDown) {
              mouseDown = false;
              clearDpad();
            }
          });
        }
        
        // Setup both D-pads
        setupDpad('dpad-portrait');
        setupDpad('dpad-landscape');
        
        // ============================================
        // BUTTON HANDLERS (A, B, START, SELECT)
        // ============================================
        
        function setupButton(selectors, stateKey) {
          const buttons = document.querySelectorAll(selectors);
          buttons.forEach(btn => {
            const handleStart = (e) => {
              e.preventDefault();
              window.virtualControlsState[stateKey] = true;
              document.querySelectorAll(selectors).forEach(b => b.classList.add('pressed'));
            };
            
            const handleEnd = (e) => {
              e.preventDefault();
              window.virtualControlsState[stateKey] = false;
              document.querySelectorAll(selectors).forEach(b => b.classList.remove('pressed'));
            };
            
            btn.addEventListener('touchstart', handleStart, { passive: false });
            btn.addEventListener('touchend', handleEnd, { passive: false });
            btn.addEventListener('touchcancel', handleEnd, { passive: false });
            
            btn.addEventListener('mousedown', handleStart);
            btn.addEventListener('mouseup', handleEnd);
            btn.addEventListener('mouseleave', handleEnd);
          });
        }
        
        // Setup A/B buttons (both portrait and landscape)
        setupButton('#btn-a-p, #btn-a-l', 'a');
        setupButton('#btn-b-p, #btn-b-l', 'b');
        
        // Setup START/SELECT buttons (both portrait and landscape)
        // Portrait: btn-start-p, btn-select-p
        // Landscape: btn-start-r (right side), btn-select-l (left side)
        setupButton('#btn-start-p, #btn-start-r', 'start');
        setupButton('#btn-select-p, #btn-select-l', 'select');
        
        // Fullscreen toggle
        if (fullscreenBtn) {
          fullscreenBtn.addEventListener('click', function(e) {
            e.preventDefault();
            const elem = document.documentElement;
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
              if (elem.requestFullscreen) {
                elem.requestFullscreen({ navigationUI: 'hide' });
              } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
              }
            } else {
              if (document.exitFullscreen) {
                document.exitFullscreen();
              } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
              }
            }
          });
        }
        
        // Prevent scrolling/zooming
        document.body.addEventListener('touchmove', function(e) {
          e.preventDefault();
        }, { passive: false });
        
        // Update controls on resize and orientation change
        window.addEventListener('resize', updateControlsVisibility);
        window.addEventListener('orientationchange', () => {
          setTimeout(updateControlsVisibility, 100);
        });
        
        document.addEventListener('fullscreenchange', () => {
          setTimeout(updateControlsVisibility, 100);
        });
        document.addEventListener('webkitfullscreenchange', () => {
          setTimeout(updateControlsVisibility, 100);
        });
        
        // Initial setup
        updateControlsVisibility();
        
        // Re-check periodically until canvas is available
        const checkInterval = setInterval(() => {
          const canvas = document.querySelector('#game-container canvas');
          if (canvas) {
            updateControlsVisibility();
            clearInterval(checkInterval);
          }
        }, 200);
        
        setTimeout(() => clearInterval(checkInterval), 10000);
      })();
    </script>
  </body>
